<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - My Website 20240140033</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">MY Website 20240140033</span>
        <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="alert alert-info">Selamat datang di aplikasi!</div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Data Mahasiswa</h4>
        <a th:href="@{/form}" class="btn btn-success">Input Data Mahasiswa</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${listMhs.empty}">
            <td colspan="4" class="text-center">Belum ada data</td>
        </tr>
        <tr th:each="mhs, iter : ${listMhs}">
            <td th:text="${iter.count}">1</td>
            <td th:text="${mhs.nama}">Nama</td>
            <td th:text="${mhs.nim}">NIM</td>
            <td th:text="${mhs.jenisKelamin}">L/P</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
